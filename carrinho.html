<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrinho | SnapBite</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <script src="js/skeleton.js"></script>
  
  <main>
    <div class="page-hero">
      <div class="page-hero-inner">
        <span class="eyebrow">Pronto para pedir?</span>
        <h1>Meu carrinho</h1>
        <p id="resumo-qtd">Carregando...</p>
      </div>
    </div>
    <div class="carrinho-wrap">
      <div class="carrinho-layout">
        <div>
          <div id="carrinho-lista"></div>
          <div style="margin-top:22px">
            <a href="cardapio.html" class="btn-ghost">← Continuar comprando</a>
          </div>
        </div>
        <div class="resumo">
          <h3>Resumo do pedido</h3>
          <div class="r-linha"><span>Subtotal</span><span id="resumo-subtotal">R$ 0,00</span></div>
          <div class="r-linha"><span>Taxa de serviço</span><span class="r-gratis">Grátis</span></div>
          <div class="r-linha r-total"><span>Total</span><span class="r-val" id="resumo-total">R$ 0,00</span></div>
          <div class="cupom-row">
            <input type="text" id="cupom" placeholder="CUPOM">
            <button onclick="showToast('Cupom não encontrado.','error')">Aplicar</button>
          </div>
          <button class="btn-finalizar" onclick="finalizarPedido()">✅ Finalizar pedido</button>
          <div class="info-senai-box">
            <span class="ic">🏫</span>
            <span>Seu pedido ficará disponível no SENAI na <strong>hora do intervalo</strong>. Retire no balcão com seu nome!</span>
          </div>
          <div style="display:flex;gap:12px;justify-content:center;margin-top:16px;font-size:0.78rem;color:var(--cinza-borda)">
            <span>🔒 Seguro</span><span>·</span><span>🎒 Retirada no SENAI</span>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="js/components.js"></script>
  <script src="js/app.js"></script>
  <script type="module" src="backend/firebase-auth.js"></script>

</body>
</html>
